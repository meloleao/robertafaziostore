<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roberta Fazio – A Menina dos Temperamentos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="style-v2.css">
</head>
<body>
<nav id="navbar">
    <div class="nav-inner">
        <div class="logo" onclick="showPage('home')">Roberta Fazio</div>
        <div class="nav-links">
            <a href="#" data-page="home" onclick="showPage('home')">Home</a>
            <a href="#" data-page="store" onclick="showPage('store')">Store</a>
            <a href="#" data-page="about" onclick="showPage('about')">Sobre</a>
            <a href="#" data-page="book" onclick="showPage('book')">Livro</a>
        </div>
        <div class="nav-actions">
            <button class="cart-btn" onclick="toggleCart()">
                <span class="material-symbols-outlined">shopping_cart</span>
                <span id="cart-badge" class="cart-badge" style="display:none">0</span>
            </button>
        </div>
    </div>
</nav>
<div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>
<div class="cart-drawer" id="cart-drawer">
    <div class="cart-header">
        <h3>Carrinho</h3>
        <button onclick="toggleCart()"><span class="material-symbols-outlined">close</span></button>
    </div>
    <div class="cart-items" id="cart-items">
        <div class="cart-empty" id="cart-empty">
            <span class="material-symbols-outlined">shopping_basket</span>
            <p>Seu carrinho está vazio.</p>
        </div>
    </div>
    <div class="cart-footer" id="cart-footer" style="display:none">
        <div class="cart-total">
            <span>Total:</span>
            <span id="cart-total-price">R$ 0,00</span>
        </div>
        <button class="btn-primary full-width" onclick="checkout()">Finalizar Compra</button>
    </div>
</div>
<div class="modal-overlay" id="checkout-modal" style="display:none">
    <div class="modal">
        <button class="modal-close" onclick="closeCheckout()"><span class="material-symbols-outlined">close</span></button>
        <div class="modal-icon"><span class="material-symbols-outlined">check_circle</span></div>
        <h2>Pedido Confirmado!</h2>
        <p>Preparamos tudo com muito carinho para você.</p>
        <p class="modal-sub">Em breve você receberá os detalhes no seu e-mail.</p>
        <button class="btn-primary full-width" onclick="closeCheckout()">Voltar à Loja</button>
    </div>
</div>
<div id="page-home" class="page active"></div>
<div id="page-store" class="page"></div>
<div id="page-about" class="page"></div>
<div id="page-book" class="page"></div>
<script src="app.js?v=SUPER_FINAL"></script>
</body>
</html>
